<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeply - Arduino Matrix Helper</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <section id="hero">
        <button class="back-button">
            <a href="https://zeply-studios.github.io">Back to Main Page</a>
        </button>
        <span class="heading">Arduino Matrix Generator</span>
    </section>
    <div class="grid">
        <div id="grid">
        </div>
        <div class="row">
            <button onclick="resetGrid()" class="btn">Reset</button>
            <button onclick="genCode()" class="btn">Print</button>
            <button onclick="copyCode()" class="btn">Copy</button>
            <select name="matrix" id="matrix" onchange="onChange(this)"
                style="float:right; margin-top: 10px; margin-right: 10px;">
                <option value="8">8x8</option>
                <option value="16">8x16</option>
            </select>
        </div>
        <div id="text">
            <code class="code" id="code"></code>
        </div>
    </div>
  
    <section id="footer">
        <p>&copy Zeply Studios 2026</p>
    </section>

</body>

</html>
